<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            750: '#2d3748',
                            850: '#1a202c',
                            950: '#0d1117',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6B7280; }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px; width: 6px; background: #9CA3AF; border-radius: 50%; display: inline-block; margin: 0 1px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden font-sans">

    <aside id="sidebar" class="w-64 bg-gray-950 border-r border-gray-800 flex flex-col transition-transform duration-300 absolute z-20 h-full md:relative md:translate-x-0 -translate-x-full">
        <div class="p-4">
            <button id="newChatBtn" class="w-full flex items-center gap-2 bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors border border-gray-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Chat
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-3 space-y-2" id="chatHistoryList">
            </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative w-full">
        <header class="h-16 border-b border-gray-800 flex items-center justify-between px-4 bg-gray-900/80 backdrop-blur-sm z-10">
            <div class="flex items-center gap-3">
                <button id="sidebarToggle" class="md:hidden text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-semibold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Universal AI</h1>
            </div>
            <button id="settingsBtn" class="text-gray-400 hover:text-white transition-colors" title="Settings">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </header>

        <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
            <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center space-y-4">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold">How can I help you today?</h2>
                <p class="text-gray-400 max-w-md">Enter your OpenRouter API key in the settings to start chatting with any model.</p>
            </div>
            </div>

        <div class="p-4 bg-gray-900 border-t border-gray-800">
            <div class="max-w-4xl mx-auto relative flex items-end gap-2 bg-gray-800 rounded-2xl border border-gray-700 focus-within:border-gray-500 transition-colors px-4 py-3 shadow-sm">
                <textarea id="messageInput" rows="1" class="w-full bg-transparent text-gray-100 placeholder-gray-400 focus:outline-none resize-none max-h-32 py-1.5" placeholder="Message AI..."></textarea>
                <button id="sendBtn" class="p-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0 mb-0.5">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>
    </main>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-800 flex justify-between items-center bg-gray-850">
                <h3 class="text-lg font-semibold text-white">Settings</h3>
                <button id="closeSettings" class="text-gray-400 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">OpenRouter API Key</label>
                    <input type="password" id="apiKeyInput" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Model Name</label>
                    <input type="text" id="modelInput" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="google/gemini-pro">
                    <p class="text-xs text-gray-500 mt-2">Examples: google/gemini-2.5-flash, openai/gpt-4o, anthropic/claude-3-haiku</p>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-850 border-t border-gray-800 flex justify-end">
                <button id="saveSettings" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg font-medium transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // State
            let config = {
                apiKey: localStorage.getItem('openRouterApiKey') || '',
                model: localStorage.getItem('openRouterModel') || 'google/gemini-2.5-flash'
            };
            let chats = JSON.parse(localStorage.getItem('universalChats')) || [];
            let currentChatId = null;

            // DOM Elements
            const els = {
                sidebar: document.getElementById('sidebar'),
                sidebarToggle: document.getElementById('sidebarToggle'),
                chatHistoryList: document.getElementById('chatHistoryList'),
                newChatBtn: document.getElementById('newChatBtn'),
                chatContainer: document.getElementById('chatContainer'),
                welcomeScreen: document.getElementById('welcomeScreen'),
                messageInput: document.getElementById('messageInput'),
                sendBtn: document.getElementById('sendBtn'),
                settingsBtn: document.getElementById('settingsBtn'),
                settingsModal: document.getElementById('settingsModal'),
                closeSettings: document.getElementById('closeSettings'),
                saveSettings: document.getElementById('saveSettings'),
                apiKeyInput: document.getElementById('apiKeyInput'),
                modelInput: document.getElementById('modelInput')
            };

            // Initialization
            renderHistoryList();
            
            // Auto-resize textarea
            els.messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
            });

            // UI Toggles
            els.sidebarToggle.addEventListener('click', () => {
                els.sidebar.classList.toggle('-translate-x-full');
            });

            els.settingsBtn.addEventListener('click', () => {
                els.apiKeyInput.value = config.apiKey;
                els.modelInput.value = config.model;
                els.settingsModal.classList.remove('hidden');
            });

            const closeSettings = () => els.settingsModal.classList.add('hidden');
            els.closeSettings.addEventListener('click', closeSettings);
            els.settingsModal.addEventListener('click', (e) => { if(e.target === els.settingsModal) closeSettings() });

            // Save Settings
            els.saveSettings.addEventListener('click', () => {
                config.apiKey = els.apiKeyInput.value.trim();
                config.model = els.modelInput.value.trim() || 'google/gemini-2.5-flash';
                localStorage.setItem('openRouterApiKey', config.apiKey);
                localStorage.setItem('openRouterModel', config.model);
                closeSettings();
            });

            // Chat History Management
            function createChat() {
                const newChat = {
                    id: Date.now().toString(),
                    title: 'New Conversation',
                    messages: []
                };
                chats.unshift(newChat);
                saveChats();
                loadChat(newChat.id);
            }

            function loadChat(id) {
                currentChatId = id;
                const chat = chats.find(c => c.id === id);
                renderHistoryList();
                
                // Clear container and keep welcome screen hidden
                Array.from(els.chatContainer.children).forEach(child => {
                    if (child.id !== 'welcomeScreen') child.remove();
                });
                
                if (!chat || chat.messages.length === 0) {
                    els.welcomeScreen.style.display = 'flex';
                } else {
                    els.welcomeScreen.style.display = 'none';
                    chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
                }
                
                // On mobile, close sidebar after selection
                if(window.innerWidth < 768) els.sidebar.classList.add('-translate-x-full');
            }

            function saveChats() {
                localStorage.setItem('universalChats', JSON.stringify(chats));
                renderHistoryList();
            }

            function renderHistoryList() {
                els.chatHistoryList.innerHTML = '';
                chats.forEach(chat => {
                    const btn = document.createElement('button');
                    btn.className = `w-full text-left px-3 py-2 rounded-lg text-sm truncate transition-colors ${chat.id === currentChatId ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-800/50 hover:text-gray-200'}`;
                    btn.textContent = chat.title;
                    btn.onclick = () => loadChat(chat.id);
                    els.chatHistoryList.appendChild(btn);
                });
            }

            els.newChatBtn.addEventListener('click', createChat);

            // Message UI
            function appendMessageUI(role, content) {
                els.welcomeScreen.style.display = 'none';
                const div = document.createElement('div');
                div.className = `flex gap-4 max-w-4xl mx-auto ${role === 'user' ? 'flex-row-reverse' : ''}`;
                
                const avatar = document.createElement('div');
                avatar.className = `w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${role === 'user' ? 'bg-gray-700' : 'bg-gradient-to-br from-blue-500 to-purple-600'}`;
                avatar.innerHTML = role === 'user' 
                    ? '<svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>'
                    : '<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>';

                const bubble = document.createElement('div');
                bubble.className = `px-4 py-3 rounded-2xl max-w-[80%] whitespace-pre-wrap ${role === 'user' ? 'bg-gray-800 text-gray-100 rounded-tr-sm' : 'bg-transparent text-gray-200'}`;
                bubble.textContent = content;

                div.appendChild(avatar);
                div.appendChild(bubble);
                els.chatContainer.appendChild(div);
                els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
                return div;
            }

            function showTyping() {
                const div = document.createElement('div');
                div.id = 'typingIndicator';
                div.className = `flex gap-4 max-w-4xl mx-auto`;
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center flex-shrink-0">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div class="px-4 py-3 bg-transparent flex items-center typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                `;
                els.chatContainer.appendChild(div);
                els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
            }

            function removeTyping() {
                const indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.remove();
            }

            // API Call
            async function handleSend() {
                const text = els.messageInput.value.trim();
                if (!text) return;
                
                if (!config.apiKey) {
                    alert("Please set your OpenRouter API key in settings first.");
                    els.settingsModal.classList.remove('hidden');
                    return;
                }

                if (!currentChatId) createChat();
                let chat = chats.find(c => c.id === currentChatId);

                // Update UI & State for User Message
                els.messageInput.value = '';
                els.messageInput.style.height = 'auto';
                els.sendBtn.disabled = true;
                
                chat.messages.push({ role: 'user', content: text });
                appendMessageUI('user', text);
                
                // Generate Title if it's the first message
                if (chat.messages.length === 1) {
                    chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
                }
                saveChats();

                showTyping();

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${config.apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: config.model,
                            messages: chat.messages
                        })
                    });

                    removeTyping();

                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    
                    const data = await response.json();
                    const aiContent = data.choices[0].message.content;

                    // Update UI & State for AI Message
                    chat.messages.push({ role: 'assistant', content: aiContent });
                    appendMessageUI('assistant', aiContent);
                    saveChats();

                } catch (error) {
                    removeTyping();
                    appendMessageUI('assistant', `Error: ${error.message}. Please check your API key and network connection.`);
                } finally {
                    els.sendBtn.disabled = false;
                    els.messageInput.focus();
                }
            }

            // Event Listeners for sending
            els.sendBtn.addEventListener('click', handleSend);
            els.messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            // Load latest chat on startup if exists
            if (chats.length > 0) {
                loadChat(chats[0].id);
            }
        });
    </script>
</body>
</html>
