<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Expert AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .message-bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 15px; }
        .user-msg { background-color: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot-msg { background-color: #f3f4f6; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e5e7eb; }
        #chat-box { height: calc(100vh - 140px); scroll-behavior: smooth; display: flex; flex-direction: column; }
        .dot-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">

    <nav class="bg-white border-b px-4 py-3 flex justify-between items-center shadow-sm">
        <span class="text-xl font-bold text-gray-800">Universal <span class="text-blue-600">AI</span></span>
        <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-medium">LIVE: DSA EXPERT</span>
    </nav>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 gap-4">
        <div class="bot-msg message-bubble">
            Hello! I am your DSA Expert assistant. Ask me anything about DSA!
        </div>
    </div>

    <div class="p-4 bg-white border-t">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="input-field" class="flex-1 border border-gray-300 rounded-full px-5 py-3 outline-none" placeholder="Ask about DSA (e.g. What is Stack?)...">
            <button onclick="askAI()" id="send-btn" class="bg-blue-600 text-white p-3 rounded-full hover:bg-blue-700 transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        // API KEY থেকে স্পেস ট্রিম করা হয়েছে এবং দ্রুততম ফ্রি মডেল দেওয়া হয়েছে
        const API_KEY = "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".trim(); 
        const MODEL_ID = "google/gemini-2.0-flash-lite-preview-02-05:free"; 
        
        const SYSTEM_DATA = "Role: DSA Expert. Answer only DSA related questions based on Arrays, Stacks, Queues, and Algorithms.";

        async function askAI() {
            const input = document.getElementById('input-field');
            const box = document.getElementById('chat-box');
            const query = input.value.trim();
            if (!query) return;

            box.innerHTML += `<div class="user-msg message-bubble shadow-sm">${query}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            const loader = document.createElement('div');
            loader.className = 'bot-msg message-bubble dot-pulse';
            loader.innerText = 'AI is thinking...';
            box.appendChild(loader);

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + API_KEY,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin
                    },
                    body: JSON.stringify({
                        model: MODEL_ID,
                        messages: [
                            { role: "system", content: SYSTEM_DATA },
                            { role: "user", content: query }
                        ]
                    })
                });

                const result = await response.json();
                loader.remove();

                if (result.choices && result.choices[0]) {
                    const reply = result.choices[0].message.content;
                    box.innerHTML += `<div class="bot-msg message-bubble shadow-sm">${reply}</div>`;
                } else {
                    box.innerHTML += `<div class="bot-msg message-bubble shadow-sm text-red-500">Error: Please check your OpenRouter API Key balance or limits.</div>`;
                }
            } catch (err) {
                loader.innerText = "Connection Error! Check internet.";
                console.error(err);
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
